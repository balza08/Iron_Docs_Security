<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Docs Security - Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0f19;
            background-image: 
                linear-gradient(rgba(11, 15, 25, 0.8), rgba(11, 15, 25, 0.8)),
                radial-gradient(#1e293b 1px, transparent 0);
            background-size: 24px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: rgba(17, 24, 39, 0.85);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5),
                        0 0 15px rgba(0, 212, 255, 0.05);
            width: 320px;
            box-sizing: border-box;
            backdrop-filter: blur(8px);
        }
        h2 { 
            text-align: center; 
            color: #ffffff; 
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 6px;
            box-sizing: border-box;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
            background: #111827;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #45a049; }
        .errore { color: red; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Login</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Accedi</button>
            <div class="link" style="text-align:center; margin-top:15px;">
                Non hai un account? <a href="{% url 'register' %}">Registrati</a>
            </div>
        </form>
        {% if errore %}
            <p class="errore">{{ errore }}</p>
        {% endif %}
    </div>
</body>
</html>
